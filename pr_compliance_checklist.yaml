pr_compliances:
  - title: "Clean Architecture の依存方向"
    compliance_label: true
    objective: "依存方向と層境界を守り Clean Architecture + MVVM を維持する"
    success_criteria: "依存方向は ui -> domain <- data。UI は ViewModel、ViewModel は UseCase 経由で domain にアクセスする。domain 層は Android Framework（View / Context）に依存しない。Hilt の注入が層境界を壊していない。"
    failure_criteria: "画面から Repository 実装を直接呼ぶ。domain 層が Android Framework に依存する。data 層の実装詳細（Room entity / mapper など）が ui 層へ漏れている。"

  - title: "ドメインモデルと値オブジェクト"
    compliance_label: true
    objective: "意味のある値を値オブジェクトで表し、不正な状態を後段へ流さない"
    success_criteria: "意味のある値は値オブジェクト化する（例: MemoTitle、MemoId、TagName、TagColor、TimestampMillis）。生成時に制約を満たし不正値を作れない形にする。"
    failure_criteria: "ドメインの意味を持つ値を primitive のまま広く引き回す。不正値を検証せず後段へ渡す。"

  - title: "データ層の構成とスキーマ管理"
    compliance_label: true
    objective: "Room / DataStore / mapper の役割分担とスキーマ管理を守る"
    success_criteria: "構造化データは Room、軽量設定値（テーマ / 表示設定 / 下書き）は DataStore。data model と domain model のズレは data 層 mapper で吸収する。Room スキーマ変更時は app/schemas/ への export と migration を追加する。"
    failure_criteria: "構造化データと軽量設定の保存先が逆。mapper を介さず data model を domain にそのまま流す。スキーマ変更時に migration を追加していない。"

  - title: "UI 実装方針"
    compliance_label: true
    objective: "Jetpack Compose / Material 3 を軸に保守しやすい UI を保つ"
    success_criteria: "状態を持たない XxxScreen と ViewModel 接続の XxxRoute を分離する。ViewModel は StateFlow で状態を公開し、非同期は Coroutines で UI スレッドを止めない。画面遷移は Navigation Compose。ライト / ダーク対応し固定色を直書きしない。Compose Preview を壊しにくい小さな部品に分割する。"
    failure_criteria: "Screen と Route を分離せず ViewModel 依存が混在する。UI スレッドをブロックする同期処理。固定色の直書き。巨大な単一 Composable。"

  - title: "アクセシビリティ対応"
    compliance_label: true
    objective: "TalkBack やスイッチ制御などの支援技術に対応し、すべてのユーザーが利用可能な UI を保つ"
    success_criteria: "意味のある画像・アイコンには contentDescription を設定する。カスタム Composable は semantics で role / state を明示する。ドロップダウンやトグルなどの操作要素は役割が支援技術へ伝わるようにする。タッチターゲットは最小 48dp を確保し、色のみに依存せず十分なコントラストを保つ。"
    failure_criteria: "意味のある画像・アイコンに contentDescription がない。カスタムコントロールに role / state の semantics がない。タッチターゲットが小さすぎる。色だけで状態を伝えている。"

  - title: "一回限り通知の扱い"
    compliance_label: false
    objective: "一回限りのイベントを取りこぼさず状態と区別して扱う"
    success_criteria: "Snackbar・画面遷移・認証要求など一回限りの通知は Channel event で表す。latest wins が成立する場合のみ Channel.CONFLATED、取りこぼせない通知は Channel.BUFFERED 等を使う。画面に残る失敗は UI state（boolean / sealed）で表す。"
    failure_criteria: "中間イベントを落とせない通知に CONFLATED を使う。一回限りの通知を state に持たせ重複発火させる。"

  - title: "ローカライズ"
    compliance_label: true
    objective: "日本語 / 英語対応を前提に表示文字列を管理する"
    success_criteria: "表示文字列は strings.xml に寄せ、日本語 / 英語の両対応を前提とする。件数などは plurals を使い、動的な値は %s / %d などのプレースホルダーで管理する。日付・数値はロケールを考慮してフォーマットし、RTL 言語へ拡張しても破綻しにくい配置にする。"
    failure_criteria: "UI に表示文字列を直書きする。複数形・動的挿入・日付・数値を固定文字列や固定フォーマットで扱う。RTL 拡張時に崩れやすい方向固定の UI を増やす。"

  - title: "Unit Test 方針"
    compliance_label: false
    objective: "JUnit 5 ベースで意図の分かるテストを保つ"
    success_criteria: "Unit Test は JUnit 5、テスト関数名は英語。Arrange / Act / Assert 構成で主要 assert は原則 1 つ。suspend / Flow のテストは kotlinx.coroutines.test.runTest を使う。Room の DAO / migration や DataStore 実装は instrumented test（androidTest）で検証する。"
    failure_criteria: "バッククォートや日本語のテスト関数名。1 関数で複数の振る舞いを検証する。新規 / 更新テストで runBlocking を使う。"

  - title: "セキュリティと秘密情報"
    compliance_label: true
    objective: "認証手段の方針を守り秘密情報を漏らさない"
    success_criteria: "アプリロック / 生体認証は androidx.biometric を使う。署名情報・AdMob・Google Play 関連の秘密情報はコミットしない。"
    failure_criteria: "鍵・署名・API キーなどの秘密情報をリポジトリにコミットする。"
