    <tspan x="500" dy="22">Size: 360 x 800</tspan>
    <tspan x="500" dy="22">Top bar: LiteMemo + search + menu</tspan>
    <tspan x="500" dy="22">Bottom nav: ホーム / カレンダー / 設定</tspan>
