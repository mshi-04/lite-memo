      .body { font-weight: 400; font-size: 13px; fill: #49454F; }
      .label { font-weight: 600; font-size: 12px; fill: #79747E; }
      .small { font-weight: 500; font-size: 11px; fill: #79747E; }
    </style>
  </defs>

  <rect width="760" height="900" fill="#F7F2FA"/>

