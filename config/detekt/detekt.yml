build:
  maxIssues: 0

complexity:
  # 純粋なロジック関数にのみ効かせる。UI 宣言（Composable）とプレビューは構造上長くなるため対象外。
  # 本番ロジックの最長メソッドは 38 行のため、60 行超は「責務過多」とみなして検出する。
  #
  # ignoreAnnotated は LongMethod ルール自体の実装ではなく、detekt の Suppressor 機構
  # （annotation suppressor）による横断的な抑制設定。ルールが検知した Issue を、対象要素の
  # アノテーションを見て後段で抑制する仕組みのため、各ルールのソースに実装が無くても機能する。
  # 公式ドキュメント https://detekt.dev/docs/introduction/suppressors 参照（Compose のユースケースとして明示的に例示されている）。
  LongMethod:
    threshold: 60
    ignoreAnnotated:
      - "Composable"
      - "Preview"
  # DI によるコンストラクタ注入は引数が増えて当然なので、コンストラクタは関数より緩める。
  # ViewModel は @HiltViewModel で除外、他の DI（Repository/UseCase）は最長 4 引数のため 7 で通る。
  # デフォルト値付き引数（テストの Fixture 等）はカウントしない。
  LongParameterList:
    functionThreshold: 6
    constructorThreshold: 7
    ignoreDefaultParameters: true
    ignoreAnnotated:
      - "Composable"
      - "HiltViewModel"

naming:
  FunctionNaming:
    ignoreAnnotated:
      - "Composable"

style:
  # Preview のサンプル値は実装ロジックではないため除外し、テーマ色は Color.kt の名前付き定数で管理する。
  # excludes はデフォルト値を上書きするため、detekt 1.23.8 のテスト除外一式も明示的に維持する。
  MagicNumber:
    excludes:
      - "**/test/**"
      - "**/androidTest/**"
      - "**/commonTest/**"
      - "**/jvmTest/**"
      - "**/androidUnitTest/**"
      - "**/androidInstrumentedTest/**"
      - "**/jsTest/**"
      - "**/iosTest/**"
      - "**/*.kts"
      - "**/ui/theme/**"
    ignoreAnnotated:
      - "Preview"
  UnusedPrivateMember:
    ignoreAnnotated:
      - "Preview"

Compose:
  active: true
