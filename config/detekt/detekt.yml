build:
  maxIssues: 0

complexity:
  # 純粋なロジック関数にのみ効かせる。UI 宣言（Composable）とプレビューは構造上長くなるため対象外。
  # 本番ロジックの最長メソッドは 38 行のため、60 行超は「責務過多」とみなして検出する。
  #
  # 注意: detekt 1.23.8 の LongMethod ソースには ignoreAnnotated を処理するコードが無く、
  # 公式には未サポート（config validation はキー自体を既知として通すため BUILD Fail はしない）。
  # ただし実機検証では ignoreAnnotated の有無で Composable/Preview 関数の検知が確実に切り替わる
  # ことを --rerun-tasks 付きで複数回再現しており、現状は意図通り機能している。
  # 原理は特定できていないため、detekt バージョンアップ時は
  # `./gradlew :app:detekt` で Composable 関数が誤検知されないか要再検証。
  LongMethod:
    threshold: 60
    ignoreAnnotated:
      - "Composable"
      - "Preview"
  # DI によるコンストラクタ注入は引数が増えて当然なので、コンストラクタは関数より緩める。
  # ViewModel は @HiltViewModel で除外、他の DI（Repository/UseCase）は最長 4 引数のため 7 で通る。
  # デフォルト値付き引数（テストの Fixture 等）はカウントしない。
  LongParameterList:
    functionThreshold: 6
    constructorThreshold: 7
    ignoreDefaultParameters: true
    ignoreAnnotated:
      - "Composable"
      - "HiltViewModel"

naming:
  FunctionNaming:
    ignoreAnnotated:
      - "Composable"

style:
  UnusedPrivateMember:
    ignoreAnnotated:
      - "Preview"

Compose:
  active: true
