[config]
response_language = "ja-JP"

[github_app]
pr_commands = [
    "/agentic_describe",
    "/agentic_review",
]
handle_push_trigger = true
push_commands = [
    "/agentic_review",
]

[review_agent]
comments_location_policy = "both"
inline_comments_severity_threshold = 3

issues_user_guidelines = """
Lite Memo は Android 向けの軽量メモアプリです。
バグ、セキュリティ、データ破損、クラッシュ、パフォーマンス劣化、
ユーザー体験の明確な退行を優先して指摘してください。
"""
