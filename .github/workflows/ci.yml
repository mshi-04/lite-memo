name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Android CI
        uses: ./.github/actions/setup-android
        with:
          cache-read-only: ${{ github.event_name != 'push' }}

      - name: Run Static Analysis
        run: bundle exec fastlane android static_analysis

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Android CI
        uses: ./.github/actions/setup-android
        with:
          cache-read-only: ${{ github.event_name != 'push' }}

      - name: Run Unit Test
        env:
          BASE_REF: ${{ github.base_ref }}
          REF: ${{ github.ref }}
        run: |
          if [ "$BASE_REF" = "develop" ] || [ "$BASE_REF" = "main" ] || [ "$REF" = "refs/heads/main" ]; then
            bundle exec fastlane android unit_test release:true
          else
            bundle exec fastlane android unit_test
          fi

      - name: Generate Kover coverage reports
        run: bundle exec fastlane android coverage

      - name: Add coverage summary to job output
        run: |
          {
            echo "## Code Coverage"
            echo ""
            echo "Kover XML and HTML reports were generated for the prodDebug unit-test variant."
            echo "Coverage is scoped to unit-testable domain, data mapping/repository, UI state, and ViewModel layers."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Kover reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kover-prod-debug-report
          path: app/build/reports/kover/**
          if-no-files-found: error

      - name: Add coverage report to PR
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: mi-kas/kover-report@db9938358b8e1e6175dd4136132bf4eb7aa4ae6d # v2.4
        with:
          path: ${{ github.workspace }}/app/build/reports/kover/**/*.xml
          title: Unit-testable Code Coverage
          update-comment: true
          coverage-counter-type: LINE

  android-test:
    name: Android Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Android CI
        uses: ./.github/actions/setup-android
        with:
          cache-read-only: ${{ github.event_name != 'push' }}

      - name: Restore AVD cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-33

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run Android Test
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bundle exec fastlane android android_test

      - name: Save AVD cache
        if: >-
          steps.avd-cache.outputs.cache-hit != 'true' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-33

  skill-sync:
    name: Claude Code Skill Sync
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check Claude Code skill synchronization
        run: ./scripts/sync-claude-skills.ps1 -Check

  wrapper-validation:
    name: Gradle Wrapper Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
